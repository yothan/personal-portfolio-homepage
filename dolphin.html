      <header class="detail-intro">
        <h1>Dolphin UI - 携程中后台视觉设计语言</h1>
        <div class="detail-summary">
          <p>中后台产品是携程作为一家服务型互联网公司的基石和保障，在公司国际化战略的引导下，面对多元化的业务和庞杂的系统，一套统一而又高效的设计语言变得十分必要。当然，中后台产品也不只是工具，以发展的眼光来看，我们也希望能有一些品牌化的思考。</p>
          <p>携程集团的 logo 是一只海豚，如果以它类比我们的前台产品，那么海豚赖以生存的大海就是我们的后台系统。广阔深邃的大海提供了海豚无限的遨游空间，在它绚烂光亮的身影之下，尽是那抹深沉而又冷静的蔚蓝。</p>
        </div>
