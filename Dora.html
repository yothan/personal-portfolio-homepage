        <div class="detail-summary">
          <p>掌上生活，招商银行生活金融 App，此次迎来了 v8.0 升级改版。本次产品定位为品质生活服务，目标人群是城市新中产。在产品架构上，我们尝试将电商、内容、金融结合到一起，以内容为入口，电商为主战场，金融为基础工具，打造一个一站式的生活服务方案。</p>
          <p>视觉的表达则侧重品质感的呈现，简约、清晰、高级灰，很好的渲染了这一氛围；同时在部分页面，杂志感的卡片设计以一种更强的代入体验加强了品质感受。</p>
